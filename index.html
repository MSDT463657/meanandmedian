  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

}\n  html, body { margin: 0; padding: 0; }\n  body {\n    font-family: 'Lato', system-ui, -apple-system, sans-serif;\n    color: var(--ink);\n    background: var(--bg);\n    line-height: 1.5;\n    -webkit-font-smoothing: antialiased;\n  }\n  .num { font-family: Georgia, 'Times New Roman', serif; font-feature-settings: \"tnum\"; }\n\n  /* ---------- Header ---------- */\n  header.top {\n    background: var(--card);\n    border-bottom: 1px solid var(--line);\n    position: sticky;\n    top: 0;\n    z-index: 30;\n  }\n  .top-inner {\n    max-width: 1120px;\n    margin: 0 auto;\n    padding: 16px 24px 0;\n  }\n  .brand {\n    display: flex;\n    align-items: center;\n    gap: 12px;\n  }\n  .mark {\n    width: 34px; height: 34px;\n    border-radius: 9px;\n    background: var(--blue);\n    display: grid; place-items: center;\n    flex: none;\n  }\n  .mark span {\n    width: 13px; height: 13px;\n    background: #fff;\n    border-radius: 3px;\n    transform: rotate(45deg);\n  }\n  .brand h1 {\n    font-size: 19px;\n    margin: 0;\n    font-weight: 900;\n    letter-spacing: -.01em;\n  }\n  .brand p {\n    margin: 0;\n    font-size: 13px;\n    color: var(--muted);\n  }\n  .tabs {\n    display: flex;\n    gap: 4px;\n    margin-top: 14px;\n    overflow-x: auto;\n    flex-wrap: nowrap;\n    scrollbar-width: none;\n  }\n  .tabs::-webkit-scrollbar { display: none; }\n  .tab {\n    appearance: none;\n    border: none;\n    background: none;\n    font-family: inherit;\n    font-size: 15px;\n    font-weight: 700;\n    color: var(--muted);\n    padding: 12px 16px;\n    cursor: pointer;\n    border-bottom: 3px solid transparent;\n    margin-bottom: -1px;\n    transition: color .15s;\n    white-space: nowrap;\n  }\n  .tab:hover { color: var(--ink); }\n  .tab.active { color: var(--blue); border-bottom-color: var(--blue); }\n\n  /* ---------- Layout ---------- */\n  main {\n    max-width: 1120px;\n    margin: 0 auto;\n    padding: 28px 24px 80px;\n  }\n  .panel { display: none; }\n  .panel.active { display: block; animation: fade .25s ease both; }\n  @keyframes fade { from { transform: translateY(6px);} to {transform:none;} }\n  @media (prefers-reduced-motion: reduce){ .panel.active { animation: none; } }\n\n  .section-title {\n    font-size: 13px;\n    font-weight: 900;\n    letter-spacing: .08em;\n    text-transform: uppercase;\n    color: var(--faint);\n    margin: 0 0 14px;\n  }\n  .lead { font-size: 17px; color: var(--muted); max-width: 720px; margin: 0 0 26px; }\n  .lead strong { color: var(--ink); }\n\n  /* ---------- Cards ---------- */\n  .grid {\n    display: grid;\n    grid-template-columns: repeat(auto-fill, minmax(330px, 1fr));\n    gap: 22px;\n    align-items: start;\n  }\n  .card {\n    background: var(--card);\n    border: 1px solid var(--line);\n    border-radius: 10px;\n    box-shadow: var(--shadow);\n    overflow: hidden;\n  }\n  .card-head {\n    background: var(--blue);\n    color: #fff;\n    padding: 9px 16px;\n    display: flex;\n    align-items: center;\n    justify-content: space-between;\n    font-weight: 700;\n  }\n  .card-head .qnum { font-size: 15px; }\n  .card-head .status {\n    font-size: 13.5px;\n    font-weight: 700;\n    display: inline-flex;\n    align-items: center;\n    gap: 6px;\n    opacity: 0;\n    transition: opacity .2s;\n  }\n  .card.answered .status { opacity: 1; }\n  .card-body { padding: 18px 20px 20px; }\n  .ctx { font-size: 15.5px; margin: 0 0 12px; color: var(--ink); }\n  .ask { font-size: 15.5px; font-weight: 700; margin: 16px 0 12px; }\n  .hint-italic { font-style: italic; color: var(--muted); font-size: 14.5px; margin: 0 0 12px; }\n  .step-label { font-weight: 700; font-size: 15px; margin: 4px 0 10px; }\n  .step-label .stepn { color: var(--blue); }\n\n  /* data: inline points */\n  .datapoints {\n    font-size: 21px;\n    text-align: center;\n    letter-spacing: .04em;\n    margin: 6px 0 4px;\n    padding: 6px 0;\n  }\n\n  /* data: tables */\n  table.kt {\n    width: 100%;\n    border-collapse: collapse;\n    margin: 4px 0 6px;\n    font-size: 15px;\n  }\n  table.kt th {\n    text-align: left;\n    font-weight: 700;\n    padding: 8px 12px;\n    border-bottom: 2px solid var(--line);\n    white-space: normal;\n    overflow-wrap: normal;\n    word-break: keep-all;\n  }\n  table.kt.h th { text-align: center; }\n  table.kt.h th:first-child { text-align: left; }\n  table.kt td {\n    padding: 9px 12px;\n    overflow-wrap: normal;\n    word-break: keep-all;\n  }\n  table.kt.v tbody tr:nth-child(odd) td { background: var(--row); }\n  table.kt td.val { font-family: Georgia, serif; font-size: 16px; }\n  table.kt.h td { text-align: center; }\n  table.kt.h td:first-child { text-align: left; font-weight: 700; }\n  table.kt.h tbody tr td { background: var(--row); }\n  table.kt.h .rowlabel { white-space: normal; }\n\n  /* chips for median sort */\n  .chips {\n    display: flex;\n    flex-wrap: wrap;\n    gap: 8px;\n    margin: 4px 0 6px;\n  }\n  .chip {\n    min-width: 46px;\n    padding: 10px 8px;\n    text-align: center;\n    background: #fff;\n    border: 1.5px solid var(--line);\n    border-radius: 8px;\n    font-family: Georgia, serif;\n    font-size: 17px;\n    cursor: grab;\n    user-select: none;\n    transition: border-color .12s, background .12s, transform .12s, box-shadow .12s;\n  }\n  .chip:hover { border-color: #c3cad6; }\n  .chip.dragging { opacity: .5; cursor: grabbing; }\n  .chip.sorted { border-color: var(--blue); }\n  .chip.median { background: var(--blue); color: #fff; border-color: var(--blue); box-shadow: 0 4px 12px rgba(27,110,243,.3); }\n  .sort-row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin: 2px 0 14px; }\n  .sort-status { font-size: 13.5px; font-weight: 700; color: var(--faint); min-height: 18px; }\n  .sort-status.ok { color: var(--green); }\n\n  /* answer row */\n  .answer-row {\n    display: flex;\n    align-items: center;\n    gap: 12px;\n    flex-wrap: wrap;\n    margin-top: 6px;\n  }\n  input.ans {\n    width: 96px;\n    padding: 11px 12px;\n    font-family: Georgia, serif;\n    font-size: 17px;\n    text-align: center;\n    border: 1.5px solid #c9d0db;\n    border-radius: 7px;\n    background: #fcfcfd;\n    transition: border-color .12s, box-shadow .12s, background .12s;\n  }\n  input.ans:focus { outline: none; border-color: var(--blue); box-shadow: 0 0 0 3px rgba(27,110,243,.15); }\n  .card.answered input.ans { border-color: #b9c2d0; background: #eef1f6; color: var(--ink); font-weight: 700; }\n  input.ans.wrong { border-color: var(--red); background: var(--red-soft); animation: shake .3s; }\n  @keyframes shake { 0%,100%{transform:none;} 25%{transform:translateX(-5px);} 75%{transform:translateX(5px);} }\n  .unit { font-size: 15.5px; color: var(--ink); }\n\n  .actions { display: flex; align-items: center; gap: 16px; margin-top: 16px; flex-wrap: wrap; }\n  button.check {\n    appearance: none; border: none;\n    background: var(--blue); color: #fff;\n    font-family: inherit; font-weight: 700; font-size: 14.5px;\n    padding: 10px 22px; border-radius: 8px; cursor: pointer;\n    transition: background .14s, transform .06s;\n  }\n  button.check:hover { background: var(--blue-dark); }\n  button.check:active { transform: translateY(1px); }\n  .card.answered button.check { background: var(--muted); }\n  .link-btn {\n    appearance: none; border: none; background: none;\n    color: var(--muted); font-family: inherit; font-size: 14px; font-weight: 700;\n    cursor: pointer; text-decoration: underline; text-underline-offset: 3px;\n    padding: 0;\n  }\n  .link-btn:hover { color: var(--ink); }\n  .feedback { font-size: 14px; font-weight: 700; min-height: 0; }\n  .feedback.bad { color: var(--red); }\n  .solution {\n    display: none;\n    margin-top: 14px;\n    padding: 14px 16px;\n    background: var(--blue-soft);\n    border-radius: 9px;\n    font-size: 14.5px;\n    color: var(--ink);\n    line-height: 1.65;\n  }\n  .solution.show { display: block; animation: fade .2s; }\n  .solution b { color: var(--blue-dark); }\n  .solution .calc { font-family: Georgia, serif; font-size: 16px; }\n\n  .mini-btn {\n    appearance: none; font-family: inherit; cursor: pointer;\n    border: 1.5px solid var(--line); background: #fff; color: var(--ink);\n    font-weight: 700; font-size: 13px; padding: 7px 13px; border-radius: 7px;\n    transition: background .12s, border-color .12s;\n  }\n  .mini-btn:hover { background: var(--row); border-color: #c3cad6; }\n\n  /* ---------- Progress ---------- */\n  .progress-wrap {\n    position: sticky; top: 112px; z-index: 20;\n    background: var(--bg);\n    padding: 6px 0 18px;\n    margin-bottom: 6px;\n  }\n  .progress-card {\n    background: var(--card); border: 1px solid var(--line); border-radius: 10px;\n    padding: 14px 18px; box-shadow: var(--shadow);\n    display: flex; align-items: center; gap: 18px;\n  }\n  .progress-card .pct { font-weight: 900; font-size: 17px; white-space: nowrap; }\n  .bar { flex: 1; height: 10px; background: var(--row); border-radius: 99px; overflow: hidden; }\n  .bar > i { display: block; height: 100%; width: 0; background: var(--green); border-radius: 99px; transition: width .4s ease; }\n  .reset { margin-left: auto; }\n\n  .part-head {\n    display: flex; align-items: baseline; gap: 12px;\n    margin: 34px 0 16px;\n  }\n  .part-head:first-of-type { margin-top: 8px; }\n  .part-head h2 { font-size: 22px; margin: 0; font-weight: 900; letter-spacing: -.01em; }\n  .part-head .badge {\n    font-size: 12px; font-weight: 900; letter-spacing: .06em; text-transform: uppercase;\n    color: var(--blue); background: var(--blue-soft); padding: 4px 10px; border-radius: 99px;\n  }\n  .part-head .badge.med { color: var(--green); background: var(--green-soft); }\n  .part-sub { color: var(--muted); font-size: 14.5px; margin-left: auto; }\n\n  /* ---------- Review widgets ---------- */\n  .review-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 22px; }\n  @media (max-width: 880px) { .review-grid { grid-template-columns: 1fr; } .progress-wrap{top:104px;} }\n  .concept {\n    background: var(--card); border: 1px solid var(--line); border-radius: 12px;\n    box-shadow: var(--shadow); padding: 24px 24px 26px;\n  }\n  .concept h3 { font-size: 19px; margin: 0 0 4px; font-weight: 900; }\n  .concept .tag { font-size: 13px; font-weight: 700; color: var(--blue); letter-spacing:.04em; text-transform: uppercase; }\n  .concept.median-c .tag { color: var(--green); }\n  .concept p { font-size: 15px; color: var(--muted); margin: 8px 0 0; }\n  .concept p strong { color: var(--ink); }\n  .formula {\n    margin: 16px 0 4px; padding: 12px 16px; background: var(--row); border-radius: 9px;\n    font-family: Georgia, serif; font-size: 16px; text-align: center;\n  }\n\n  /* mean bars widget */\n  .bars { display: flex; align-items: flex-end; gap: 14px; height: 200px; position: relative; margin: 22px 4px 6px; padding-top: 6px; }\n  .bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; height: 100%; justify-content: flex-end; gap: 8px; }\n  .bar-track { width: 100%; flex: 1; display: flex; align-items: flex-end; }\n  .bar-fill {\n    width: 100%; background: linear-gradient(180deg,#4a8bf6,#1b6ef3); border-radius: 6px 6px 0 0;\n    transition: height .35s cubic-bezier(.3,.8,.4,1); min-height: 4px;\n    display: flex; align-items: flex-start; justify-content: center; color: #fff; font-family: Georgia, serif;\n    font-size: 14px; padding-top: 4px;\n  }\n  .bar-ctrls { display: flex; gap: 4px; }\n  .bar-ctrls button {\n    width: 26px; height: 26px; border-radius: 6px; border: 1.5px solid var(--line); background: #fff;\n    font-size: 16px; font-weight: 700; cursor: pointer; color: var(--blue); line-height: 1; padding: 0;\n  }\n  .bar-ctrls button:hover { background: var(--blue-soft); }\n  .mean-line {\n    position: absolute; left: 0; right: 0; border-top: 2px dashed var(--green);\n    transition: bottom .35s cubic-bezier(.3,.8,.4,1); pointer-events: none;\n  }\n  .mean-line::after {\n    content: attr(data-label); position: absolute; right: 0; top: -22px;\n    background: var(--green); color: #fff; font-size: 12px; font-weight: 700;\n    padding: 2px 8px; border-radius: 6px; font-family: 'Lato', sans-serif;\n  }\n  .calc-line { text-align: center; font-family: Georgia, serif; font-size: 17px; margin-top: 14px; }\n  .calc-line b { color: var(--green); }\n\n  /* median widget */\n  .med-chips { display: flex; flex-wrap: wrap; gap: 8px; margin: 20px 0 4px; justify-content: center; }\n  .med-chip {\n    min-width: 48px; padding: 12px 10px; text-align: center; border-radius: 8px;\n    border: 1.5px solid var(--line); background: #fff; font-family: Georgia, serif; font-size: 18px;\n    transition: all .3s ease;\n  }\n  .med-chip.is-median { background: var(--green); color: #fff; border-color: var(--green); transform: translateY(-4px); box-shadow: 0 6px 14px rgba(20,133,95,.3); }\n  .med-chip.is-median-pair { background: var(--green-soft); border-color: var(--green); color: var(--green); }\n  .med-result { text-align: center; font-size: 15.5px; margin-top: 16px; min-height: 24px; }\n  .med-result b { color: var(--green); font-family: Georgia, serif; font-size: 18px; }\n  .widget-ctrls { display: flex; gap: 8px; justify-content: center; margin-top: 18px; flex-wrap: wrap; }\n\n  /* ---------- PDF results sheet ---------- */\n  .pc-actions { margin-left: auto; display: flex; align-items: center; gap: 14px; }\n  .mini-btn.savepdf { border-color: var(--blue); color: var(--blue); display: inline-flex; align-items: center; gap: 6px; }\n  .mini-btn.savepdf:hover { background: var(--blue-soft); }\n  #printSheet { display: none; color: #1a1a1a; font-size: 12px; line-height: 1.5; }\n  @media print {\n    html.print-results { background: #fff; }\n    html.print-results header.top,\n    html.print-results main { display: none !important; }\n    html.print-results #printSheet { display: block !important; }\n    @page { margin: 1.4cm; }\n    .ps-q { break-inside: avoid; }\n    h3.ps-part { break-after: avoid; }\n  }\n  .ps-head { display: flex; justify-content: space-between; align-items: flex-end; border-bottom: 2.5px solid var(--blue); padding-bottom: 10px; }\n  .ps-name { font-size: 22px; font-weight: 900; letter-spacing: -.01em; }\n  .ps-meta { text-align: right; font-size: 12px; color: #444; line-height: 1.55; }\n  .ps-meta b { color: var(--blue); }\n  .ps-score { display: flex; gap: 14px; margin: 14px 0 6px; font-weight: 700; font-size: 13px; }\n  .ps-score span { background: #f1f4f9; border-radius: 6px; padding: 6px 12px; }\n  .ps-score .tot { background: var(--blue); color: #fff; }\n  h3.ps-part { font-size: 14px; margin: 18px 0 6px; padding-bottom: 4px; border-bottom: 1px solid #ddd; }\n  .ps-q { padding: 8px 0 9px; border-bottom: 1px solid #eee; }\n  .ps-qhead { display: flex; gap: 8px; align-items: baseline; }\n  .ps-num { font-weight: 900; min-width: 22px; }\n  .ps-ctx { flex: 1; }\n  .ps-ctx em { font-weight: 700; font-style: normal; }\n  .ps-mark { font-weight: 900; font-size: 14px; }\n  .ps-mark.ok { color: #14855f; }\n  .ps-mark.no { color: #d23b3b; }\n  .ps-data-mini { margin: 4px 0 0 30px; font-size: 11.5px; color: #555; }\n  .ps-line { margin: 4px 0 0 30px; font-size: 12px; }\n  .ps-line .lbl { color: #666; }\n  .ps-your { font-family: Georgia, serif; font-weight: 700; }\n  .ps-your.no { color: #d23b3b; }\n  .ps-your.none { font-family: 'Lato', sans-serif; font-weight: 700; color: #999; }\n  .ps-corr { font-family: Georgia, serif; font-weight: 700; color: #14855f; }\n  .ps-sol { margin: 4px 0 0 30px; font-size: 11.5px; color: #555; font-family: Georgia, serif; }\n<\u002Fstyle>\n<\u002Fhead>\n\n<body>\n<header class=\"top\">\n  <div class=\"top-inner\">\n    <div class=\"brand\">\n      <div class=\"mark\"><span><\u002Fspan><\u002Fdiv>\n      <div>\n        <h1>Mean &amp; Median<\u002Fh1>\n        <p>An interactive review and five practice quizzes<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <nav class=\"tabs\" id=\"tabsNav\">\n      <button class=\"tab active\" data-tab=\"review\">Review<\u002Fbutton>\n    <\u002Fnav>\n  <\u002Fdiv>\n<\u002Fheader>\n\n<main>\n  <!-- ============ REVIEW ============ -->\n  <section class=\"panel active\" id=\"panel-review\">\n    <p class=\"lead\">Mean and median are two ways to find the <strong>center<\u002Fstrong> of a set of numbers. Play with the widgets below to see how each one works, then pick a <strong>Practice Quiz<\u002Fstrong> to start practicing.<\u002Fp>\n\n    <div class=\"review-grid\">\n      <!-- MEAN concept -->\n      <div class=\"concept mean-c\">\n        <div class=\"tag\">Mean<\u002Fdiv>\n        <h3>The average — sharing equally<\u002Fh3>\n        <p>The <strong>mean<\u002Fstrong> tells you what each value <em>would be<\u002Fem> if you took everything and shared it out evenly. Add up all the values, then divide by how many there are.<\u002Fp>\n        <div class=\"formula\">mean = (sum of all values) ÷ (how many values)<\u002Fdiv>\n        <p style=\"margin-top:14px\">Use the <b style=\"color:var(--blue)\">+<\u002Fb> and <b style=\"color:var(--blue)\">−<\u002Fb> buttons to change the bars. Watch the dashed green line — that's the mean, the height every bar would have if they were all leveled out.<\u002Fp>\n        <div class=\"bars\" id=\"meanBars\"><\u002Fdiv>\n        <div class=\"calc-line\" id=\"meanCalc\"><\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- MEDIAN concept -->\n      <div class=\"concept median-c\">\n        <div class=\"tag\">Median<\u002Fdiv>\n        <h3>The middle value<\u002Fh3>\n        <p>The <strong>median<\u002Fstrong> is the number right in the <em>middle<\u002Fem> once the data is lined up from least to greatest. It's not affected by a few very large or very small numbers.<\u002Fp>\n        <div class=\"formula\">sort the data → pick the middle number<\u002Fdiv>\n        <p style=\"margin-top:14px\">Press <b style=\"color:var(--green)\">Sort<\u002Fb> to line the numbers up, then watch the middle value light up. With an <em>even<\u002Fem> count, the median is the average of the two middle numbers.<\u002Fp>\n        <div class=\"med-chips\" id=\"medChips\"><\u002Fdiv>\n        <div class=\"med-result\" id=\"medResult\">Press <b style=\"color:var(--green)\">Sort<\u002Fb> to find the median.<\u002Fdiv>\n        <div class=\"widget-ctrls\">\n          <button class=\"mini-btn\" id=\"medShuffle\">↻ Shuffle<\u002Fbutton>\n          <button class=\"mini-btn\" id=\"medSort\">Sort least → greatest<\u002Fbutton>\n          <button class=\"mini-btn\" id=\"medToggle\">Switch to even count<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ PRACTICE QUIZZES (built by JS) ============ -->\n  <div id=\"quizPanels\"><\u002Fdiv>\n<\u002Fmain>\n\n<div id=\"printSheet\"><\u002Fdiv>\n\n<script src=\"09077b79-93e7-4389-8d1a-51ce080766cd\"><\u002Fscript>\n<script>\n/* =========================================================\n   HELPERS\n   ========================================================= */\nconst sum = a => a.reduce((s,x)=>s+x,0);\nconst meanOf = a => sum(a)/a.length;\nconst sortedAsc = a => [...a].sort((x,y)=>x-y);\nfunction medianOf(a){\n  const s = sortedAsc(a), n = s.length, m = Math.floor(n/2);\n  return n % 2 ? s[m] : (s[m-1]+s[m])/2;\n}\nconst fmt = n => Number.isInteger(n) ? String(n) : (Math.round(n*100)/100).toString();\nfunction approxEq(a, b){ return Math.abs(a-b) < 0.005; }\n\n/* progress state */\nconst STORE_KEY = 'meanMedianProgress_v2';\nlet state = { solved: {}, answers: {} };\ntry { const raw = localStorage.getItem(STORE_KEY); if (raw) state = JSON.parse(raw); } catch(e){}\nfunction save(){ try { localStorage.setItem(STORE_KEY, JSON.stringify(state)); } catch(e){} }\n\n/* =========================================================\n   RENDER DATA BLOCKS\n   ========================================================= */\nfunction renderData(d){\n  if (!d || d.type === 'none') return '';\n  if (d.type === 'inline'){\n    return `<div class=\"datapoints\">${d.values.map(v=>`<span class=\"num\">${v}<\u002Fspan>`).join(',&nbsp; ')}<\u002Fdiv>`;\n  }\n  if (d.type === 'vtable'){\n    return `<table class=\"kt v\"><thead><tr><th>${d.headers[0]}<\u002Fth><th>${d.headers[1]}<\u002Fth><\u002Ftr><\u002Fthead><tbody>${\n      d.rows.map(r=>`<tr><td>${r[0]}<\u002Ftd><td class=\"val\">${r[1]}<\u002Ftd><\u002Ftr>`).join('')\n    }<\u002Ftbody><\u002Ftable>`;\n  }\n  if (d.type === 'htable'){\n    return `<table class=\"kt v\"><thead><tr><th>${d.corner}<\u002Fth><th>${d.rowLabel}<\u002Fth><\u002Ftr><\u002Fthead><tbody>${\n      d.cols.map((c,i)=>`<tr><td>${c}<\u002Ftd><td class=\"val num\">${d.vals[i]}<\u002Ftd><\u002Ftr>`).join('')\n    }<\u002Ftbody><\u002Ftable>`;\n  }\n  return '';\n}\n\n/* =========================================================\n   CARD MARKUP\n   ========================================================= */\nfunction meanCardHTML(q, i, ans){\n  return `\n    <div class=\"card-head\">\n      <span class=\"qnum\">${i+1}<\u002Fspan>\n      <span class=\"status\">✓ Saved<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"card-body\">\n      <p class=\"ctx\">${q.ctx}<\u002Fp>\n      ${renderData(q.data)}\n      <p class=\"ask\">${q.ask}<\u002Fp>\n      <div class=\"answer-row\">\n        <input class=\"ans\" type=\"text\" inputmode=\"decimal\" aria-label=\"Your answer\" />\n        <span class=\"unit\">${q.unit}<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"actions\">\n        <button class=\"check\">Submit<\u002Fbutton>\n      <\u002Fdiv>\n      <div class=\"feedback\"><\u002Fdiv>`;\n}\nfunction medianCardHTML(q, i, ans){\n  const s = sortedAsc(q.values);\n  const n = s.length, m = Math.floor(n/2);\n  let solStep2;\n  if (n % 2){\n    solStep2 = `With ${n} values, the middle one is the ${m+1}<sup>th<\u002Fsup>: <b><span class=\"num\">${ans}<\u002Fspan><\u002Fb>.`;\n  } else {\n    solStep2 = `With ${n} values, average the two middle numbers (${s[m-1]} and ${s[m]}):<br><span class=\"calc\">(${s[m-1]} + ${s[m]}) ÷ 2 = ${fmt(ans)}<\u002Fspan>.`;\n  }\n  return `\n    <div class=\"card-head\">\n      <span class=\"qnum\">${i+1}<\u002Fspan>\n      <span class=\"status\">✓ Saved<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"card-body\">\n      <p class=\"ctx\">${q.ctx}<\u002Fp>\n      <p class=\"hint-italic\">Answer 2 questions about the data points.<\u002Fp>\n      <p class=\"step-label\"><span class=\"stepn\">1.<\u002Fspan> Sort the data from least to greatest.<\u002Fp>\n      <div class=\"chips\"><\u002Fdiv>\n      <div class=\"sort-row\">\n        <button class=\"mini-btn autosort\">Auto-sort<\u002Fbutton>\n        <span class=\"sort-status\"><\u002Fspan>\n      <\u002Fdiv>\n      <p class=\"step-label\"><span class=\"stepn\">2.<\u002Fspan> ${q.ask}<\u002Fp>\n      <div class=\"answer-row\">\n        <input class=\"ans\" type=\"text\" inputmode=\"decimal\" aria-label=\"Your answer\" />\n        <span class=\"unit\">${q.unit}<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"actions\">\n        <button class=\"check\">Submit<\u002Fbutton>\n      <\u002Fdiv>\n      <div class=\"feedback\"><\u002Fdiv>`;\n}\n\n/* =========================================================\n   BUILD ALL QUIZZES\n   ========================================================= */\nconst QUIZZES = window.QUIZZES || [];\nconst quizRegistry = [];\nconst tabsNav = document.getElementById('tabsNav');\nconst quizPanels = document.getElementById('quizPanels');\n\nQUIZZES.forEach((quiz, qi) => {\n  // tab\n  const tab = document.createElement('button');\n  tab.className = 'tab';\n  tab.dataset.tab = 'quiz-' + qi;\n  tab.textContent = 'Practice Quiz ' + (qi + 1);\n  tabsNav.appendChild(tab);\n\n  // panel\n  const panel = document.createElement('section');\n  panel.className = 'panel';\n  panel.id = 'panel-quiz-' + qi;\n  panel.innerHTML = `\n    <div class=\"progress-wrap\">\n      <div class=\"progress-card\">\n        <span class=\"pct\">0 of 20 solved<\u002Fspan>\n        <div class=\"bar\"><i><\u002Fi><\u002Fdiv>\n        <div class=\"pc-actions\">\n          <button class=\"mini-btn savepdf\">⤓ Save results (PDF)<\u002Fbutton>\n          <button class=\"link-btn reset\">Reset this quiz<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"part-head\">\n      <h2>Part 1 — Mean<\u002Fh2>\n      <span class=\"badge\">10 questions<\u002Fspan>\n      <span class=\"part-sub\">Add the values, then divide by how many there are.<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"grid mean-grid\"><\u002Fdiv>\n    <div class=\"part-head\">\n      <h2>Part 2 — Median<\u002Fh2>\n      <span class=\"badge med\">10 questions<\u002Fspan>\n      <span class=\"part-sub\">Sort the data, then find the middle value.<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"grid median-grid\"><\u002Fdiv>`;\n  quizPanels.appendChild(panel);\n\n  const reg = { ids: [], pctLabel: panel.querySelector('.pct'), barFill: panel.querySelector('.bar > i') };\n  quizRegistry.push(reg);\n\n  const meanGrid = panel.querySelector('.mean-grid');\n  const medianGrid = panel.querySelector('.median-grid');\n\n  quiz.mean.forEach((q, i) => {\n    const id = `q${qi}-mean-${i}`;\n    reg.ids.push(id);\n    const ans = meanOf(q.values);\n    const card = document.createElement('div');\n    card.className = 'card';\n    card.id = id;\n    card.innerHTML = meanCardHTML(q, i, ans);\n    meanGrid.appendChild(card);\n    wireCard(card, id, ans);\n  });\n\n  quiz.median.forEach((q, i) => {\n    const id = `q${qi}-median-${i}`;\n    reg.ids.push(id);\n    const ans = medianOf(q.values);\n    const card = document.createElement('div');\n    card.className = 'card';\n    card.id = id;\n    card.innerHTML = medianCardHTML(q, i, ans);\n    medianGrid.appendChild(card);\n    buildChips(card.querySelector('.chips'), q.values, card);\n    card.querySelector('.autosort').addEventListener('click', () => autoSortChips(card.querySelector('.chips'), card));\n    wireCard(card, id, ans);\n  });\n\n  // reset just this quiz\n  panel.querySelector('.reset').addEventListener('click', () => {\n    if (!confirm('Reset all answers for Practice Quiz ' + (qi + 1) + '?')) return;\n    reg.ids.forEach(id => { delete state.solved[id]; delete state.answers[id]; });\n    save();\n    panel.querySelectorAll('.card').forEach(resetCard);\n    updateProgress();\n  });\n\n  panel.querySelector('.savepdf').addEventListener('click', () => printQuiz(qi));\n});\n\nfunction resetCard(c){\n  c.classList.remove('answered');\n  const inp = c.querySelector('input.ans'); if (inp) inp.value = '';\n  const chk = c.querySelector('button.check'); if (chk) chk.textContent = 'Submit';\n  const fb = c.querySelector('.feedback'); if (fb) fb.textContent = '';\n  const ss = c.querySelector('.sort-status'); if (ss){ ss.textContent=''; ss.classList.remove('ok'); }\n  c.querySelectorAll('.chip').forEach(ch => ch.classList.remove('sorted','median'));\n}\n\n/* =========================================================\n   CHIPS (sortable) for median cards\n   ========================================================= */\nfunction buildChips(container, values, card){\n  container.innerHTML = '';\n  values.forEach(v => {\n    const chip = document.createElement('div');\n    chip.className = 'chip';\n    chip.textContent = v;\n    chip.dataset.val = v;\n    chip.draggable = true;\n    chip.addEventListener('dragstart', () => { chip.classList.add('dragging'); });\n    chip.addEventListener('dragend', () => { chip.classList.remove('dragging'); checkSorted(container, card); });\n    container.appendChild(chip);\n  });\n  container.addEventListener('dragover', e => {\n    e.preventDefault();\n    const dragging = container.querySelector('.dragging');\n    if (!dragging) return;\n    const after = getDragAfter(container, e.clientX, e.clientY);\n    if (after == null) container.appendChild(dragging);\n    else container.insertBefore(dragging, after);\n  });\n}\nfunction getDragAfter(container, x, y){\n  const els = [...container.querySelectorAll('.chip:not(.dragging)')];\n  let closest = { dist: Infinity, el: null };\n  els.forEach(child => {\n    const box = child.getBoundingClientRect();\n    const cx = box.left + box.width/2, cy = box.top + box.height/2;\n    if (x < cx + 1 && y < box.bottom){\n      const dist = Math.hypot(x-cx, y-cy);\n      if (dist < closest.dist) closest = { dist, el: child };\n    }\n  });\n  return closest.el;\n}\nfunction currentChipOrder(container){\n  return [...container.querySelectorAll('.chip')].map(c => Number(c.dataset.val));\n}\nfunction checkSorted(container, card){\n  const order = currentChipOrder(container);\n  const isSorted = order.every((v,i) => i===0 || order[i-1] <= v);\n  const status = card.querySelector('.sort-status');\n  const chips = [...container.querySelectorAll('.chip')];\n  if (isSorted){\n    status.textContent = '✓ Sorted! Now read off the middle value and enter it below.';\n    status.classList.add('ok');\n    chips.forEach(c => c.classList.add('sorted'));\n  } else {\n    status.textContent = 'Keep going — drag the numbers into order.';\n    status.classList.remove('ok');\n    chips.forEach(c => c.classList.remove('sorted','median'));\n  }\n}\nfunction highlightMedianChips(chips, order){\n  chips.forEach(c => c.classList.remove('median'));\n  const n = order.length, m = Math.floor(n/2);\n  if (n % 2) chips[m].classList.add('median');\n  else { chips[m-1].classList.add('median'); chips[m].classList.add('median'); }\n}\nfunction autoSortChips(container, card){\n  const chips = [...container.querySelectorAll('.chip')];\n  chips.sort((a,b) => Number(a.dataset.val) - Number(b.dataset.val));\n  chips.forEach(c => container.appendChild(c));\n  checkSorted(container, card);\n}\n\n/* =========================================================\n   CARD CHECK / SOLVE LOGIC\n   ========================================================= */\nfunction wireCard(card, id, answer){\n  const input = card.querySelector('input.ans');\n  const checkBtn = card.querySelector('button.check');\n  const feedback = card.querySelector('.feedback');\n\n  if (state.answers[id] != null && String(state.answers[id]).trim() !== ''){\n    input.value = state.answers[id];\n    markAnswered(card);\n  }\n\n  function attempt(){\n    const raw = input.value.trim();\n    if (raw === ''){ input.focus(); return; }\n    state.answers[id] = raw;\n    // correctness is recorded silently for the results sheet only\n    const val = parseFloat(raw.replace(',', '.'));\n    state.solved[id] = (!isNaN(val) && approxEq(val, answer));\n    markAnswered(card);\n    feedback.textContent = '✓ Answer saved — you can change it any time before you save your results.';\n    save();\n    updateProgress();\n  }\n  checkBtn.addEventListener('click', attempt);\n  input.addEventListener('keydown', e => { if (e.key === 'Enter') attempt(); });\n}\nfunction markAnswered(card){\n  card.classList.add('answered');\n  card.querySelector('button.check').textContent = 'Update answer';\n}\n\n/* =========================================================\n   PROGRESS (per quiz)\n   ========================================================= */\nfunction updateProgress(){\n  quizRegistry.forEach(reg => {\n    const total = reg.ids.length || 20;\n    const done = reg.ids.filter(id => state.answers[id] != null && String(state.answers[id]).trim() !== '').length;\n    if (reg.pctLabel) reg.pctLabel.textContent = `${done} of ${total} answered`;\n    if (reg.barFill) reg.barFill.style.width = (done/total*100) + '%';\n  });\n}\nupdateProgress();\n\n/* =========================================================\n   SAVE RESULTS TO PDF (per quiz)\n   ========================================================= */\nfunction answerInfo(id, correctAns){\n  const raw = state.answers[id];\n  const has = raw != null && String(raw).trim() !== '';\n  const isRight = has && approxEq(parseFloat(String(raw).replace(',', '.')), correctAns);\n  return { has, raw: has ? String(raw).trim() : null, isRight };\n}\nfunction meanSolStr(q, ans){\n  return `${q.values.join(' + ')} = ${sum(q.values)};  ${sum(q.values)} ÷ ${q.values.length} = ${fmt(ans)}`;\n}\nfunction medianSolStr(q, ans){\n  const s = sortedAsc(q.values), n = s.length, m = Math.floor(n/2);\n  if (n % 2) return `sorted: ${s.join(', ')};  middle value = ${fmt(ans)}`;\n  return `sorted: ${s.join(', ')};  (${s[m-1]} + ${s[m]}) ÷ 2 = ${fmt(ans)}`;\n}\nfunction psRow(i, q, id, ans, kind){\n  const info = answerInfo(id, ans);\n  const mark = info.isRight ? '<span class=\"ps-mark ok\">✓<\u002Fspan>' : '<span class=\"ps-mark no\">✗<\u002Fspan>';\n  const your = info.has\n    ? `<span class=\"ps-your ${info.isRight ? '' : 'no'}\">${info.raw} ${q.unit}<\u002Fspan>`\n    : `<span class=\"ps-your none\">(no answer)<\u002Fspan>`;\n  const showData = kind === 'median' || (q.data && q.data.type && q.data.type !== 'none');\n  const dataLine = showData ? `<div class=\"ps-data-mini\">Data: ${q.values.join(', ')}<\u002Fdiv>` : '';\n  return `<div class=\"ps-q\">\n    <div class=\"ps-qhead\"><span class=\"ps-num\">${i+1}.<\u002Fspan><span class=\"ps-ctx\">${q.ctx} <em>${q.ask}<\u002Fem><\u002Fspan>${mark}<\u002Fdiv>\n    ${dataLine}\n    <div class=\"ps-line\"><span class=\"lbl\">Answer given:<\u002Fspan> ${your}<\u002Fdiv>\n  <\u002Fdiv>`;\n}\nfunction buildPrintSheet(qi){\n  const quiz = QUIZZES[qi];\n  let meanScore = 0, medScore = 0;\n  const meanRows = quiz.mean.map((q, i) => {\n    const ans = meanOf(q.values);\n    if (answerInfo(`q${qi}-mean-${i}`, ans).isRight) meanScore++;\n    return psRow(i, q, `q${qi}-mean-${i}`, ans, 'mean');\n  }).join('');\n  const medRows = quiz.median.map((q, i) => {\n    const ans = medianOf(q.values);\n    if (answerInfo(`q${qi}-median-${i}`, ans).isRight) medScore++;\n    return psRow(i, q, `q${qi}-median-${i}`, ans, 'median');\n  }).join('');\n  const today = new Date().toLocaleDateString(undefined, { year: 'numeric', month: 'long', day: 'numeric' });\n  document.getElementById('printSheet').innerHTML = `\n    <div class=\"ps-head\">\n      <div class=\"ps-name\">Dylan Jones<\u002Fdiv>\n      <div class=\"ps-meta\"><b>Practice Quiz ${qi+1}<\u002Fb> — Mean &amp; Median<br>Date: ${today}<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"ps-score\">\n      <span>Mean: ${meanScore} / 10<\u002Fspan>\n      <span>Median: ${medScore} / 10<\u002Fspan>\n      <span class=\"tot\">Total: ${meanScore+medScore} / 20<\u002Fspan>\n    <\u002Fdiv>\n    <h3 class=\"ps-part\">Part 1 — Mean<\u002Fh3>\n    ${meanRows}\n    <h3 class=\"ps-part\">Part 2 — Median<\u002Fh3>\n    ${medRows}`;\n}\nfunction printQuiz(qi){\n  buildPrintSheet(qi);\n  document.documentElement.classList.add('print-results');\n  window.print();\n}\nwindow.addEventListener('afterprint', () => document.documentElement.classList.remove('print-results'));\n\n/* =========================================================\n   TABS\n   ========================================================= */\ndocument.querySelectorAll('.tab').forEach(tab => {\n  tab.addEventListener('click', () => {\n    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));\n    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));\n    tab.classList.add('active');\n    document.getElementById('panel-' + tab.dataset.tab).classList.add('active');\n    window.scrollTo({ top: 0, behavior: 'smooth' });\n  });\n});\n\n/* =========================================================\n   REVIEW WIDGET 1 — MEAN BARS\n   ========================================================= */\nlet barVals = [3, 7, 2, 8, 5];\nconst meanBarsEl = document.getElementById('meanBars');\nconst meanCalcEl = document.getElementById('meanCalc');\nconst MAX_BAR = 12;\nfunction renderMeanBars(){\n  meanBarsEl.innerHTML = '';\n  barVals.forEach((v, i) => {\n    const col = document.createElement('div');\n    col.className = 'bar-col';\n    col.innerHTML = `\n      <div class=\"bar-track\"><div class=\"bar-fill\" style=\"height:${(v/MAX_BAR)*100}%\">${v}<\u002Fdiv><\u002Fdiv>\n      <div class=\"bar-ctrls\">\n        <button data-i=\"${i}\" data-d=\"-1\">−<\u002Fbutton>\n        <button data-i=\"${i}\" data-d=\"1\">+<\u002Fbutton>\n      <\u002Fdiv>`;\n    meanBarsEl.appendChild(col);\n  });\n  const line = document.createElement('div');\n  line.className = 'mean-line';\n  const meanV = meanOf(barVals);\n  const trackFrac = (meanV / MAX_BAR);\n  const ctrlSpace = 34;\n  const trackHeight = meanBarsEl.clientHeight - ctrlSpace;\n  line.style.bottom = (ctrlSpace + trackFrac * trackHeight) + 'px';\n  line.setAttribute('data-label', 'mean = ' + fmt(meanV));\n  meanBarsEl.appendChild(line);\n  meanCalcEl.innerHTML = `${barVals.join(' + ')} = ${sum(barVals)},&nbsp;&nbsp; ${sum(barVals)} ÷ ${barVals.length} = <b>${fmt(meanV)}<\u002Fb>`;\n}\nmeanBarsEl.addEventListener('click', e => {\n  const btn = e.target.closest('button');\n  if (!btn) return;\n  const i = +btn.dataset.i, d = +btn.dataset.d;\n  barVals[i] = Math.max(0, Math.min(MAX_BAR, barVals[i] + d));\n  renderMeanBars();\n});\nrenderMeanBars();\nwindow.addEventListener('resize', renderMeanBars);\n\n/* =========================================================\n   REVIEW WIDGET 2 — MEDIAN CHIPS\n   ========================================================= */\nlet medOddSet = [7, 2, 9, 4, 6, 1, 8];\nlet medEvenSet = [7, 2, 9, 4, 6, 1, 8, 3];\nlet medUsingEven = false;\nlet medCurrent = [...medOddSet];\nconst medChipsEl = document.getElementById('medChips');\nconst medResultEl = document.getElementById('medResult');\nconst medToggleBtn = document.getElementById('medToggle');\n\nfunction renderMedChips(highlight){\n  medChipsEl.innerHTML = '';\n  medCurrent.forEach(v => {\n    const c = document.createElement('div');\n    c.className = 'med-chip';\n    c.textContent = v;\n    medChipsEl.appendChild(c);\n  });\n  if (highlight){\n    const chips = [...medChipsEl.children];\n    const n = medCurrent.length, m = Math.floor(n/2);\n    if (n % 2) chips[m].classList.add('is-median');\n    else { chips[m-1].classList.add('is-median-pair'); chips[m].classList.add('is-median-pair'); }\n  }\n}\nfunction shuffleArr(a){ for(let i=a.length-1;i>0;i--){const j=(Math.random()*(i+1))|0;[a[i],a[j]]=[a[j],a[i]];} return a; }\n\ndocument.getElementById('medShuffle').addEventListener('click', () => {\n  medCurrent = shuffleArr([...medCurrent]);\n  renderMedChips(false);\n  medResultEl.innerHTML = 'Press <b style=\"color:var(--green)\">Sort<\u002Fb> to find the median.';\n});\ndocument.getElementById('medSort').addEventListener('click', () => {\n  medCurrent = sortedAsc(medCurrent);\n  renderMedChips(true);\n  const med = medianOf(medCurrent);\n  const n = medCurrent.length, m = Math.floor(n/2), s = medCurrent;\n  if (n % 2){\n    medResultEl.innerHTML = `${n} values → the middle one is the median: <b>${med}<\u002Fb>`;\n  } else {\n    medResultEl.innerHTML = `${n} values → average the two middle ones: (${s[m-1]} + ${s[m]}) ÷ 2 = <b>${fmt(med)}<\u002Fb>`;\n  }\n});\nmedToggleBtn.addEventListener('click', () => {\n  medUsingEven = !medUsingEven;\n  medCurrent = medUsingEven ? [...medEvenSet] : [...medOddSet];\n  medToggleBtn.textContent = medUsingEven ? 'Switch to odd count' : 'Switch to even count';\n  renderMedChips(false);\n  medResultEl.innerHTML = `Now ${medCurrent.length} values (${medUsingEven?'even':'odd'}). Press <b style=\"color:var(--green)\">Sort<\u002Fb> to find the median.`;\n});\nrenderMedChips(false);\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
